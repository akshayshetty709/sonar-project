kubectl apply -f - <<'EOF'
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: configure-containerd
  namespace: kube-system
spec:
  selector:
    matchLabels:
      name: configure-containerd
  template:
    metadata:
      labels:
        name: configure-containerd
    spec:
      hostPID: true
      tolerations:
      - operator: Exists
      initContainers:
      - name: configure
        image: ubuntu
        securityContext:
          privileged: true
        command: ["/bin/sh", "-c"]
        args:
        - |
          mkdir -p /host/etc/containerd/certs.d/13.200.12.217
          cat > /host/etc/containerd/certs.d/13.200.12.217/hosts.toml <<TOML
          server = "http://13.200.12.217"
          [host."http://13.200.12.217"]
            capabilities = ["pull", "resolve"]
            skip_verify = true
          TOML
          nsenter --mount=/proc/1/ns/mnt -- systemctl restart containerd
        volumeMounts:
        - name: host-etc
          mountPath: /host/etc
      containers:
      - name: pause
        image: registry.k8s.io/pause:3.9
      volumes:
      - name: host-etc
        hostPath:
          path: /etc
EOF
